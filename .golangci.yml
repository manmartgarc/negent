run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
    exclude-functions:
      - (io.Closer).Close
      - (*os.File).Close
      - (io.ReadCloser).Close
      - (io.WriteCloser).Close
  govet:
    enable-all: true
    disable:
      - shadow
      - fieldalignment
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/manmart/negent

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
