name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release archives
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-dev}"
          mkdir -p dist

          for TARGET in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            GOOS="${TARGET%/*}"
            GOARCH="${TARGET#*/}"
            OUT="negent-${VERSION}-${GOOS}-${GOARCH}"

            GOOS="$GOOS" GOARCH="$GOARCH" CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" -o negent .
            tar -czf "dist/${OUT}.tar.gz" negent LICENSE README.md
          done

          sha256sum dist/*.tar.gz > dist/checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
