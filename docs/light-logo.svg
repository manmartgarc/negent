<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%" fill="none">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="gradText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#0E7490" />
    </linearGradient>
    <linearGradient id="gradLine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891B2" />
      <stop offset="50%" stop-color="#0369A1" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
  </defs>

  <g transform="translate(110, 20)">
    <path d="M 30,125 Q 50,70 100,70" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4,4" />
    <path d="M 210,125 Q 190,180 140,180" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4,4" />
    <path d="M 100,180 Q 60,210 20,185" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4,4" />

    <path d="M 60,180 L 60,70 L 180,180 L 180,70" stroke="url(#gradLine)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />

    <path d="M 60,125 L 180,125" stroke="#0369A1" stroke-width="3" stroke-dasharray="6,6" opacity="0.5" />

    <circle cx="60" cy="180" r="14" fill="#FFFFFF" stroke="#0891B2" stroke-width="5" filter="url(#glow)" />
    <circle cx="60" cy="70" r="14" fill="#FFFFFF" stroke="#0891B2" stroke-width="5" filter="url(#glow)" />
    <circle cx="180" cy="180" r="14" fill="#FFFFFF" stroke="#1D4ED8" stroke-width="5" filter="url(#glow)" />
    <circle cx="180" cy="70" r="14" fill="#FFFFFF" stroke="#1D4ED8" stroke-width="5" filter="url(#glow)" />

    <circle cx="30" cy="125" r="5" fill="#0891B2" />
    <circle cx="210" cy="125" r="5" fill="#1D4ED8" />
    <circle cx="20" cy="185" r="4" fill="#64748B" />
  </g>

  <g transform="translate(360, 130)">
    <text x="0" y="0" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="82" fill="url(#gradText)" letter-spacing="-2.5">negent</text>
    <text x="6" y="38" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-weight="500" font-size="20" fill="#64748B" letter-spacing="0.5">Agent-agnostic dotfile sync</text>
  </g>
</svg>
